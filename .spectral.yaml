extends: ["spectral:oas"]

rules:
  operation-must-define-500:
    description: Every operation must document a 500 (Internal Server Error) response.
    message: "{{path}} is missing a 500 response. Org governance requires every operation to declare 500."
    severity: error
    given: "$.paths[*][get,put,post,delete,patch]"
    then:
      field: "responses.500"
      function: truthy
