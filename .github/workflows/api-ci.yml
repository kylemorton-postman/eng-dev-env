name: API CI — governance + tests

on:
  push:
    branches: [main, dev, my-change]
  pull_request:
    branches: [main, dev]

jobs:
  governance-lint:
    name: Governance lint (Postman)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint spec against Postman governance rules
        uses: postmanlabs/postman-cli-action@v1
        with:
          api-key: ${{ secrets.POSTMANAPIKEY }}
          command: 'spec lint index.yaml --fail-severity ERROR'

  functional-tests:
    name: Functional tests (Postman CLI)
    needs: governance-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run account-services collection
        uses: postmanlabs/postman-cli-action@v1
        with:
          api-key: ${{ secrets.POSTMANAPIKEY }}
          command: 'collection run 54544576-f708aed2-98ba-43cb-b248-3a716e07ff65 --environment postman/environments/mock\ (TEST).environment.yaml'
