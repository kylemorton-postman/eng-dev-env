openapi: 3.0.0
info:
  title: account-services
  version: 1.0.0
  description: |-
    Core account management endpoints for the **account-services** API. All operations live under the `/accounts/{accountNumber}` resource.

    ## Endpoints

    | Method | Endpoint | Description |
    | --- | --- | --- |
    | `GET` | `/accounts/:accountNumber` | Retrieve a summary overview of an account |
    | `PATCH` | `/accounts/:accountNumber` | Update details for an account |
    | `DELETE` | `/accounts/:accountNumber` | Delete an account |
    | `GET` | `/accounts/:accountNumber/statement` | Fetch the most recent statement |

    ## Variables

    - `{{baseUrl}}` — The base URL of the account-services API (configured in the active environment)
        
    - `:accountNumber` — Path parameter identifying the target account (also available as the `accountNumber` environment variable)
servers:
  - url: '{{baseUrl}}'
paths:
  '/accounts/{accountNumber}/statement':
    get:
      summary: Latest Statement
      responses:
        '200':
          description: 200 Ok - Successful Retrieval
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: object
                    properties:
                      opening:
                        type: number
                      closing:
                        type: number
                  money:
                    type: object
                    properties:
                      in:
                        type: number
                      out:
                        type: number
                  transactions:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                        description:
                          type: string
                        type:
                          type: string
                        amount:
                          type: number
                        balance:
                          type: number
              example:
                balance:
                  opening: 834.85
                  closing: 118.51
                money:
                  in: 167.49
                  out: 730.71
                transactions:
                  - date: 'Mon Jun 30 2025 15:36:11 GMT+0000 (Coordinated Universal Time)'
                    description: Schoen Inc
                    type: invoice
                    amount: 253.14
                    balance: 451.58
                  - date: 'Mon Jun 30 2025 13:14:47 GMT+0000 (Coordinated Universal Time)'
                    description: Zulauf - Satterfield
                    type: invoice
                    amount: 373.16
                    balance: 3.16
                  - date: 'Tue Jul 01 2025 03:13:33 GMT+0000 (Coordinated Universal Time)'
                    description: Towne and Sons
                    type: withdrawal
                    amount: 463.67
                    balance: 279.5
                  - date: 'Tue Jul 01 2025 02:51:14 GMT+0000 (Coordinated Universal Time)'
                    description: 'Hansen, Pfannerstill and Rath'
                    type: payment
                    amount: 87.25
                    balance: 525.04
                  - date: 'Tue Jul 01 2025 03:23:16 GMT+0000 (Coordinated Universal Time)'
                    description: Carter LLC
                    type: withdrawal
                    amount: 60.53
                    balance: 638.96
        '400':
          description: 400 Bad Request - Invalid Account Number
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type: string
                      referenceId:
                        type: string
              example:
                error:
                  code: INVALID_ACCOUNT_NUMBER
                  message: The account number provided is not in a valid format.
                  details: 'Account number must be a 10-digit numeric string. Received: ''ABC123''.'
        '401':
          description: 401 Unauthorized - Missing or Invalid Token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type: string
                      referenceId:
                        type: string
              example:
                error:
                  code: UNAUTHORIZED
                  message: Authentication is required to access this resource.
                  details: Bearer token is missing or has expired. Please re-authenticate and try again.
        '404':
          description: 404 Not Found - Account Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type: string
                      referenceId:
                        type: string
              example:
                error:
                  code: ACCOUNT_NOT_FOUND
                  message: No account was found matching the provided account number.
                  details: Account number does not exist or has been closed.
        '500':
          description: 500 Internal Server Error - Unexpected Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type: string
                      referenceId:
                        type: string
              example:
                error:
                  code: INTERNAL_SERVER_ERROR
                  message: An unexpected error occurred while processing your request.
                  details: The server encountered an internal error. Please try again later or contact support if the issue persists.
                  referenceId: err_8f3a2c1d-4b7e-4f9a-b2d6-1c3e5f7a9b0d
      tags:
        - accounts
        - '{accountNumber}'
      description: Fetch the most recent statement for an account.
    parameters:
      - name: accountNumber
        in: path
        required: true
        schema:
          type: string
        example: '{{accountNumber}}'
  '/accounts/{accountNumber}':
    get:
      summary: Account Overview
      responses:
        '200':
          description: 200 Ok - Successful Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      currency:
                        type: string
                      status:
                        type: string
                  balance:
                    type: object
                    properties:
                      current:
                        type: number
                      available:
                        type: number
                      as_of:
                        type: string
                  summary:
                    type: object
                    properties:
                      total_transactions:
                        type: integer
                      invoices:
                        type: integer
                      payments:
                        type: integer
                      deposits:
                        type: integer
                      withdrawals:
                        type: integer
                  money:
                    type: object
                    properties:
                      in:
                        type: number
                      out:
                        type: number
                      net:
                        type: number
                  recent_transactions:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                        description:
                          type: string
                        type:
                          type: string
                        amount:
                          type: number
              example:
                account:
                  id: ACC-00123
                  name: Primary Business Account
                  currency: USD
                  status: active
                balance:
                  current: 118.51
                  available: 118.51
                  as_of: 'Tue Jul 01 2025 10:36:30 GMT+0000 (Coordinated Universal Time)'
                summary:
                  total_transactions: 10
                  invoices: 2
                  payments: 2
                  deposits: 3
                  withdrawals: 3
                money:
                  in: 167.49
                  out: 730.71
                  net: -563.22
                recent_transactions:
                  - date: 'Tue Jul 01 2025 10:36:30 GMT+0000 (Coordinated Universal Time)'
                    description: Gerhold Inc
                    type: deposit
                    amount: 113.22
                  - date: 'Tue Jul 01 2025 03:23:16 GMT+0000 (Coordinated Universal Time)'
                    description: Carter LLC
                    type: withdrawal
                    amount: 60.53
                  - date: 'Tue Jul 01 2025 03:13:33 GMT+0000 (Coordinated Universal Time)'
                    description: Towne and Sons
                    type: withdrawal
                    amount: 463.67
      tags:
        - accounts
        - '{accountNumber}'
      description: Retrieve a summary overview of an account.
    parameters:
      - name: accountNumber
        in: path
        required: true
        schema:
          type: string
        example: '{{accountNumber}}'
    patch:
      summary: Update Account
      responses:
        '200':
          description: 200 Ok - Account Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      currency:
                        type: string
                      status:
                        type: string
                      updated_at:
                        type: string
                  message:
                    type: string
              example:
                account:
                  id: ACC-00123
                  name: New Business Account Name
                  currency: USD
                  status: active
                  updated_at: 'Tue Jul 01 2025 10:36:30 GMT+0000 (Coordinated Universal Time)'
                message: Account updated successfully
      tags:
        - accounts
        - '{accountNumber}'
      description: Update details for an account.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                currency:
                  type: string
                status:
                  type: string
            example:
              name: New Business Account Name
              currency: USD
              status: active
    delete:
      summary: Delete Account
      responses:
        '200':
          description: 200 Ok - Account Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      currency:
                        type: string
                      status:
                        type: string
                      updated_at:
                        type: string
                  message:
                    type: string
              example:
                account:
                  id: ACC-00123
                  name: New Business Account Name
                  currency: USD
                  status: active
                  updated_at: 'Tue Jul 01 2025 10:36:30 GMT+0000 (Coordinated Universal Time)'
                message: Account deleted successfully
      tags:
        - accounts
        - '{accountNumber}'
      description: Delete an account.
security:
  - bearerAuth: []