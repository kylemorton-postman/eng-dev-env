$kind: http-request
description: Create
url: "{{baseUrl}}/accounts/:accountNumber/delete"
method: DELETE
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: accountNumber
    value: "{{accountNumber}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "name": "New Business Account Name",
      "currency": "USD",
      "status": "active"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "currency": {
          "type": "string"
        },
        "status": {
          "type": "string"
        }
      }
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200 - Account deleted", () => {
          pm.response.to.have.status(200);
      });

      pm.test("Response confirms deletion", () => {
          const res = pm.response.json();
          pm.expect(res.message).to.eql("Account deleted successfully");
      });
    language: text/javascript
examples: ./.resources/Delete Account.resources/examples
order: 4000
