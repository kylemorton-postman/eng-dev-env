$kind: http-example
request:
  url: ://{{baseUrl}}/accounts/:accountNumber/update
  method: PATCH
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    accountNumber: ACC_867-5309
  body:
    type: json
    content: |-
      {
        "name": "New Business Account Name",
        "currency": "USD",
        "status": "active"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "account": {
          "id": "ACC-00123",
          "name": "New Business Account Name",
          "currency": "USD",
          "status": "active",
          "updated_at": "Tue Jul 01 2025 10:36:30 GMT+0000 (Coordinated Universal Time)"
        },
        "message": "Account updated successfully"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "account": {
            "type": "object",
            "properties": {
              "id": {
                "type": "string"
              },
              "name": {
                "type": "string"
              },
              "currency": {
                "type": "string"
              },
              "status": {
                "type": "string"
              },
              "updated_at": {
                "type": "string"
              }
            }
          },
          "message": {
            "type": "string"
          }
        }
      }
order: 1000
