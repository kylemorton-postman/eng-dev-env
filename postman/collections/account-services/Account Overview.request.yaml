$kind: http-request
description: Overview
url: "{{baseUrl}}/accounts/:accountNumber/overview"
method: GET
headers:
  - key: x-mock-response-code
    value: "200"
    $type: integer
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: accountNumber
    value: "{{accountNumber}}"
    description: "(Required) "
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: "{}"
  $type: |-
    {
      "type": "object"
    }
scripts:
  - type: afterResponse
    code: |-
      const Ajv = require('ajv');
      const ajv = new Ajv();

      const schema = {
          type: "object",
          required: ["account", "balance", "summary", "recent_transactions"],
          properties: {
              account: { type: "object", required: ["id", "status"] },
              balance: { type: "object", required: ["current", "available"] },
              summary: { type: "object", required: ["total_transactions"] },
              recent_transactions: { type: "array" }
          }
      };

      pm.test("Response matches contract schema", () => {
          const valid = ajv.validate(schema, pm.response.json());
          pm.expect(valid, ajv.errorsText()).to.be.true;
      });
    language: text/javascript
examples: ./.resources/Account Overview.resources/examples
order: 2000
