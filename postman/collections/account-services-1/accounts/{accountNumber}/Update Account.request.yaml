$kind: http-request
name: Update Account
description: Update details for an account.
url: "{{baseUrl}}/accounts/:accountNumber"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: accountNumber
    value: "{{accountNumber}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "name": "New Business Account Name",
      "currency": "USD",
      "status": "active"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "currency": {
          "type": "string"
        },
        "status": {
          "type": "string"
        }
      }
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Update Account.resources/examples
order: 3000
