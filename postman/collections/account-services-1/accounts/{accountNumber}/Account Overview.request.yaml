$kind: http-request
name: Account Overview
description: Retrieve a summary overview of an account.
url: "{{baseUrl}}/accounts/:accountNumber"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: accountNumber
    value: "{{accountNumber}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Account Overview.resources/examples
order: 2000
