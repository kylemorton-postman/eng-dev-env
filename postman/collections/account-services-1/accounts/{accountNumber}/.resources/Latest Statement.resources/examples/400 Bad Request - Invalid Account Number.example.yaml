$kind: http-example
request:
  url: "{{baseUrl}}/accounts/:accountNumber/statement"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    accountNumber: "{{accountNumber}}"
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "INVALID_ACCOUNT_NUMBER",
          "message": "The account number provided is not in a valid format.",
          "details": "Account number must be a 10-digit numeric string. Received: 'ABC123'."
        }
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "error": {
            "type": "object",
            "properties": {
              "code": {
                "type": "string"
              },
              "message": {
                "type": "string"
              },
              "details": {
                "type": "string"
              },
              "referenceId": {
                "type": "string"
              }
            }
          }
        }
      }
order: 2000
