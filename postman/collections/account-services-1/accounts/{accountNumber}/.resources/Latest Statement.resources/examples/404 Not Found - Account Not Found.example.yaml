$kind: http-example
request:
  url: "{{baseUrl}}/accounts/:accountNumber/statement"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    accountNumber: "{{accountNumber}}"
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "ACCOUNT_NOT_FOUND",
          "message": "No account was found matching the provided account number.",
          "details": "Account number does not exist or has been closed."
        }
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "error": {
            "type": "object",
            "properties": {
              "code": {
                "type": "string"
              },
              "message": {
                "type": "string"
              },
              "details": {
                "type": "string"
              },
              "referenceId": {
                "type": "string"
              }
            }
          }
        }
      }
order: 4000
